name = "rapyard-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
node_compat = true

# Shared bindings for all environments
kv_namespaces = [
  { binding = "KV", id = "rapyard_kv" }
]

r2_buckets = [
  { binding = "R2", bucket_name = "rapyard-assets" }
]

[[d1_databases]]
binding = "DB"
database_name = "rapyard-db"
database_id = "rapyard-db"
