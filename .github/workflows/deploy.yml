name: RapYard Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web:
    name: Web Deploy
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.mark.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter apps/web build

      - name: Mark status
        id: mark
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

  mobile:
    name: Mobile Build
    runs-on: ubuntu-latest
    needs: web
    outputs:
      status: ${{ steps.mark.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build mobile
        run: pnpm --filter apps/mobile build

      - name: Mark status
        id: mark
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

  edge:
    name: Supabase Edge
    runs-on: ubuntu-latest
    needs: web
    outputs:
      status: ${{ steps.mark.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy edge functions
        run: |
          echo "TODO: supabase functions deploy"
          # supabase functions deploy ...

