        id: mark
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

  workers:
    name: Workers
    runs-on: ubuntu-latest
    needs: web
    outputs:
      status: ${{ steps.mark.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy workers
        run: |
          echo "TODO: deploy background workers"
          # e.g. fly deploy / cloudflare workers / etc

      - name: Mark status
        id: mark
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

  infra:
    name: Infra
    runs-on: ubuntu-latest
    needs: [web, edge]
    outputs:
      status: ${{ steps.mark.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform plan & apply
        run: |
          echo "TODO: terraform plan/apply"
          # terraform init
          # terraform plan
          # terraform apply -auto-approve

      - name: Mark status
        id: mark
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

  canary:
    name: Canary
    runs-on: ubuntu-latest
    needs: [web, mobile]
    outputs:
      status: ${{ steps.mark.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run canary tests
        run: |
          echo "TODO: run canary / smoke tests"
          # e2e tests against canary env

      - name: Mark status
        id: mark
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

  dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [web, mobile, edge, workers, infra, canary]
    steps:
      - name: Render RapYard Deploy Dashboard
        uses: ./.github/actions/deploy-dashboard
        with:
          web_status: ${{ needs.web.outputs.status }}
          mobile_status: ${{ needs.mobile.outputs.status }}
          edge_status: ${{ needs.edge.outputs.status }}
          workers_status: ${{ needs.workers.outputs.status }}
          infra_status: ${{ needs.infra.outputs.status }}
          canary_status: ${{ needs.canary.outputs.status }}
          last_release: ${{ github.sha }}

