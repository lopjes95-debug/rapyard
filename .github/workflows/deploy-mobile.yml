name: Deploy Mobile

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  NODE_VERSION: 20

jobs:
  build_mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Build Android release
        run: |
          cd apps/mobile
          npx expo run:android --variant release

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-release
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

  test_lab:
    runs-on: ubuntu-latest
    needs: build_mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          service_account_key: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          export_default_credentials: true

      - name: Build test APKs
        run: |
          cd apps/mobile
          ./gradlew assembleAndroidTest assembleDebug

      - name: Run Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
            --test apps/mobile/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=Pixel2,version=30,locale=en,orientation=portrait

  canary_mobile:
    runs-on: ubuntu-latest
    needs: test_lab
    environment: canary
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mobile-release
          path: release/

      - name: Upload to Firebase App Distribution (canary)
        run: |
          firebase appdistribution:distribute \
            release/app-release.apk \
            --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} \
            --groups "internal-testers" \
            --token ${{ secrets.FIREBASE_TOKEN }}

  approve_prod:
    runs-on: ubuntu-latest
    needs: canary_mobile
    environment:
      name: production
    steps:
      - name: Await approval
        run: echo "Approve in GitHub UI"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: approve_prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mobile-release
          path: release/

      - name: Upload to Firebase App Distribution (prod)
        run: |
          firebase appdistribution:distribute \
            release/app-release.apk \
            --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} \
            --groups "production" \
            --token ${{ secrets.FIREBASE_TOKEN }}

  rollback_mobile:
    runs-on: ubuntu-latest
    if: failure()
    needs: deploy_prod
    steps:
      - name: Rollback mobile (manual)
        run: echo "Rollback mobile build manually in Firebase Console"
  dashboard:
    runs-on: ubuntu-latest
    needs: [deploy_prod, rollback_mobile]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Dashboard
        uses: ./.github/actions/deploy-dashboard
        with:
          web_status: "N/A"
          mobile_status: ${{ needs.deploy_prod.result }}
          edge_status: "N/A"
          workers_status: "N/A"
          infra_status: "N/A"
          canary_status: ${{ needs.canary_mobile.result }}
          last_release: ${{ github.sha }}
