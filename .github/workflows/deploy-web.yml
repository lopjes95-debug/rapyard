name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  NODE_VERSION: 20

jobs:
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Build web
        run: pnpm --filter ./apps/web build

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

  test_web:
    runs-on: ubuntu-latest
    needs: build_web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install deps
        run: pnpm install
      - name: Run tests
        run: pnpm test

  canary_web:
    runs-on: ubuntu-latest
    needs: test_web
    environment: canary
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

      - name: Deploy canary to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:canary \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Supabase Edge (canary)
        run: |
          supabase functions deploy \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  approve_prod:
    runs-on: ubuntu-latest
    needs: canary_web
    environment:
      name: production
      url: https://rapyard.app
    steps:
      - name: Await approval
        run: echo "Approve in GitHub UI"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: approve_prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.next

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Supabase Edge
        run: |
          supabase functions deploy \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  rollback_web:
    runs-on: ubuntu-latest
    if: failure()
    needs: deploy_prod
    steps:
      - name: Rollback Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase hosting:rollback \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --token ${{ secrets.FIREBASE_TOKEN }}
deploy-web.yml