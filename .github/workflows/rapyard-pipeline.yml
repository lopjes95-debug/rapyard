name: RapYard Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID_APP: ${{ secrets.VERCEL_PROJECT_ID_APP }}
  VERCEL_PROJECT_ID_API: ${{ secrets.VERCEL_PROJECT_ID_API }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

  build-api:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build API
        working-directory: apps/api
        run: npm run build

  build-app:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build Next.js App
        working-directory: apps/app
        run: npm run build

  deploy-api:
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API to Vercel
        run: |
          npx vercel deploy \
            --cwd apps/api \
            --prod \
            --token $VERCEL_TOKEN \
            --yes

  deploy-app:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy App to Vercel
        run: |
          npx vercel deploy \
            --cwd apps/app \
            --prod \
            --token $VERCEL_TOKEN \
            --yes

  dashboard:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-app]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Render RapYard Deploy Dashboard
        uses: ./.github/actions/deploy-dashboard

      - name: Upload Dashboard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapyard-dashboard
          path: rapyard-deploy-dashboard.md
